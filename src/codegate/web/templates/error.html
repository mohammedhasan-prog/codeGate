{% extends "base.html" %}

{% block title %}Error - CodeGate{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body text-center py-5">
                <div class="mb-4">
                    <i class="bi bi-exclamation-triangle display-1 text-warning"></i>
                </div>
                <h3 class="text-muted mb-3">Oops! Something went wrong</h3>
                <p class="text-muted mb-4">
                    {{ error_message or "An unexpected error occurred while processing your request." }}
                </p>
                <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                    <a href="{{ url_for('index') }}" class="btn btn-primary">
                        <i class="bi bi-house"></i>
                        Go to Dashboard
                    </a>
                    <a href="{{ url_for('scan_page') }}" class="btn btn-outline-primary">
                        <i class="bi bi-search"></i>
                        Start New Scan
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
